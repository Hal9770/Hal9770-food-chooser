<!DOCTYPE html>
<html lang="zh-CN"> <!-- 改成中文编码习惯 -->
<head>
    <meta charset="UTF-8">
    <title>今天吃什么决策系统</title>
    <style>
        /* 这里稍微加点内联样式，让你的“卡片”看起来像个样，不用背，复制即可 */
        #food-card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            background-color: #f9f9f9;
            display: none; /* 一开始隐藏，有数据再显示 */
        }
        .info-item { margin: 5px 0; }
        .highlight { color: #e74c3c; font-weight: bold; font-size: 1.2em; }

        /* 新增：给下拉框和按钮加点间距，好看点 */
        #canteenSelect {
            padding: 5px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<!-- 【新增】用户操作区 -->
<div id="user-section" style="margin-bottom: 20px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
    <!-- 未登录时显示的内容 -->
    <div id="auth-forms">
        用户名：<input type="text" id="username-input" placeholder="请输入用户名">
        密码：<input type="password" id="password-input" placeholder="请输入密码">
        <button id="login-btn">登录</button>
        <button id="register-btn">注册</button>
    </div>

    <!-- 登录成功后显示的内容（默认隐藏） -->
    <div id="user-info" style="display: none;">
        欢迎你，<span id="current-user" style="color: blue; font-weight: bold;"></span>！
        <button id="logout-btn">退出登录</button>
    </div>
</div>
<h1>今天吃什么？</h1>
<!-- 【新增】下拉选择框 -->
<!-- value="" 表示默认选项，值为空，代表“全校随机” -->
<!-- 其他 value 值(如"一食堂")必须和你数据库 positionv2 字段里的内容完全一致 -->
<select id="canteenSelect">
    <option value="">-- 全校随机 --</option>
    <option value="一食堂">一食堂</option>
    <option value="二食堂">二食堂</option>
    <option value="一食堂一楼">一食堂一楼</option>
    <option value="一食堂二楼">一食堂二楼</option>
    <option value="二食堂一楼">二食堂一楼</option>
    <option value="二食堂二楼">二食堂二楼</option>
    <!-- 如果数据库里有其他食堂，照着上面格式添加 -->
</select>

<button id="chooseBtn">随机选一个</button>

<!-- 这里不再只是一个 p 标签，而是一个卡片容器 -->
<div id="food-card">
    <div class="info-item">食物名称：<span id="food-name" class="highlight"></span></div>
    <!-- 改动点：canteen 改为 position，对应 positionv2 -->
    <div class="info-item">所在位置：<span id="food-position"></span></div>
</div>

<script src="script.js"></script>
</body>
</html>
